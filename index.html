<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Hub - News Feed</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <h1>Blog Hub</h1>
            </div>
            <div class="nav-menu" id="navMenu">
                <a href="index.html" class="nav-link active">Home</a>
                <a href="create-blog.html" class="nav-link" id="createBlogLink" style="display: none;">Create Blog</a>
                <a href="dashboard.html" class="nav-link" id="dashboardLink" style="display: none;">My Blogs</a>
                <a href="login.html" class="nav-link" id="loginLink">Login</a>
                <a href="register.html" class="nav-link" id="registerLink">Register</a>
                <span class="nav-link" id="userName" style="display: none;"></span>
                <button class="btn btn-secondary" id="logoutBtn" style="display: none;">Logout</button>
            </div>
            <button class="nav-toggle" id="navToggle">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container">
        <!-- Search Bar -->
        <section class="search-section">
            <input type="text" id="searchInput" class="search-input" placeholder="Search blogs by title...">
        </section>

        <!-- News Feed Header -->
        <section class="feed-header">
            <h2> News Feed</h2>
            <p class="subtitle">Discover stories from our community</p>
        </section>

        <!-- Blogs Container -->
        <div id="blogsContainer" class="blogs-container">
            <!-- Blogs will be dynamically loaded here -->
            <div class="loading">Loading blogs...</div>
        </div>

        <!-- No Results Message -->
        <div id="noResults" class="no-results" style="display: none;">
            <p>No blogs found. Be the first to create one!</p>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 Blog Hub. All rights reserved.</p>
        </div>
    </footer>

    <script src="auth.js"></script>
    <script src="blog.js"></script>
    <script src="app.js"></script>
    <script>
        // Initialize page
        document.addEventListener('DOMContentLoaded', () => {
            app.initNavigation();
            blog.displayAllBlogs();
            
            // Search functionality
            const searchInput = document.getElementById('searchInput');
            searchInput.addEventListener('input', (e) => {
                blog.displayAllBlogs(e.target.value);
            });
        });
    </script>
</body>
</html>
