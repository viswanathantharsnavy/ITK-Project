<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Blog Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <h1>📝 Blog Hub</h1>
            </div>
            <div class="nav-menu">
                <a href="index.html" class="nav-link">Home</a>
                <a href="login.html" class="nav-link">Login</a>
                <a href="register.html" class="nav-link active">Register</a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container">
        <div class="auth-container">
            <div class="auth-card">
                <h2>Create Account</h2>
                <p class="auth-subtitle">Join our blogging community</p>

                <form id="registerForm" class="auth-form">
                    <div class="form-group">
                        <label for="registerName">Full Name</label>
                        <input type="text" id="registerName" class="form-control" required placeholder="Enter your full name">
                        <span class="error-message" id="registerNameError"></span>
                    </div>

                    <div class="form-group">
                        <label for="registerEmail">Email</label>
                        <input type="email" id="registerEmail" class="form-control" required placeholder="Enter your email">
                        <span class="error-message" id="registerEmailError"></span>
                    </div>

                    <div class="form-group">
                        <label for="registerPassword">Password</label>
                        <input type="password" id="registerPassword" class="form-control" required placeholder="Create a password (min. 6 characters)">
                        <span class="error-message" id="registerPasswordError"></span>
                    </div>

                    <div class="form-group">
                        <label for="registerConfirmPassword">Confirm Password</label>
                        <input type="password" id="registerConfirmPassword" class="form-control" required placeholder="Confirm your password">
                        <span class="error-message" id="registerConfirmPasswordError"></span>
                    </div>

                    <div class="form-group">
                        <button type="submit" class="btn btn-primary btn-block">Create Account</button>
                    </div>

                    <div class="auth-footer">
                        <p>Already have an account? <a href="login.html">Login here</a></p>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 Blog Hub. All rights reserved.</p>
        </div>
    </footer>

    <script src="auth.js"></script>
    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const registerForm = document.getElementById('registerForm');
            
            registerForm.addEventListener('submit', (e) => {
                e.preventDefault();
                
                const name = document.getElementById('registerName').value.trim();
                const email = document.getElementById('registerEmail').value.trim();
                const password = document.getElementById('registerPassword').value;
                const confirmPassword = document.getElementById('registerConfirmPassword').value;
                
                // Get error elements
                const nameError = document.getElementById('registerNameError');
                const emailError = document.getElementById('registerEmailError');
                const passwordError = document.getElementById('registerPasswordError');
                const confirmPasswordError = document.getElementById('registerConfirmPasswordError');
                
                // Clear previous errors
                nameError.textContent = '';
                emailError.textContent = '';
                passwordError.textContent = '';
                confirmPasswordError.textContent = '';
                
                // Validation
                let isValid = true;
                
                if (!name) {
                    nameError.textContent = 'Name is required';
                    isValid = false;
                } else if (name.length < 2) {
                    nameError.textContent = 'Name must be at least 2 characters';
                    isValid = false;
                }
                
                if (!email) {
                    emailError.textContent = 'Email is required';
                    isValid = false;
                } else if (!/\S+@\S+\.\S+/.test(email)) {
                    emailError.textContent = 'Please enter a valid email';
                    isValid = false;
                }
                
                if (!password) {
                    passwordError.textContent = 'Password is required';
                    isValid = false;
                } else if (password.length < 6) {
                    passwordError.textContent = 'Password must be at least 6 characters';
                    isValid = false;
                }
                
                if (!confirmPassword) {
                    confirmPasswordError.textContent = 'Please confirm your password';
                    isValid = false;
                } else if (password !== confirmPassword) {
                    confirmPasswordError.textContent = 'Passwords do not match';
                    isValid = false;
                }
                
                if (isValid) {
                    const result = auth.register(name, email, password);
                    if (result.success) {
                        alert('Account created successfully! Redirecting to login...');
                        window.location.href = 'login.html';
                    } else {
                        emailError.textContent = result.message;
                    }
                }
            });
        });
    </script>
</body>
</html>
